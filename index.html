<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece - Capa</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('imagens/capa/capa.png.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Pirata One', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .capa-container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        .capa-titulo {
            font-size: 6em;
            color: #fff;
            text-shadow: 6px 6px 0 #000, -3px -3px 5px rgba(0,0,0,0.9);
            letter-spacing: 4px;
            animation: slideInDown 0.8s ease-out;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .capa-subtitulo {
            font-size: 2.5em;
            color: #ffdd00;
            text-shadow: 3px 3px 0 #000;
            animation: slideInUp 0.8s ease-out 0.3s backwards;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 60px;
        }

        .botoes-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
            max-width: 900px;
            animation: fadeIn 1s ease-out 0.6s backwards;
        }

        .botao-principal {
            background: linear-gradient(135deg, rgba(255, 69, 0, 0.95), rgba(255, 140, 0, 0.95));
            border: 3px solid #fff;
            color: #fff;
            padding: 25px 20px;
            font-size: 1.3em;
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 140px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            animation: slideInUp 0.6s ease-out backwards;
        }

        .botao-principal:nth-child(1) { animation-delay: 0.7s; }
        .botao-principal:nth-child(2) { animation-delay: 0.8s; }
        .botao-principal:nth-child(3) { animation-delay: 0.9s; }
        .botao-principal:nth-child(4) { animation-delay: 1s; }
        .botao-principal:nth-child(5) { animation-delay: 1.1s; }

        .botao-principal::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .botao-principal:hover::before {
            left: 100%;
        }

        .botao-principal:hover {
            background: linear-gradient(135deg, rgba(255, 140, 0, 1), rgba(255, 200, 0, 1));
            transform: translateY(-10px) scale(1.08);
            box-shadow: 0 12px 30px rgba(255, 140, 0, 0.8);
        }

        .botao-principal:active {
            transform: scale(0.95);
        }

        .botao-icone {
            font-size: 2.5em;
            margin-bottom: 8px;
            display: block;
        }

        .botao-label {
            display: block;
            font-size: 1.1em;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== BOTÃO QR CODE ===== */
        .botao-qr-fixo {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ff4500, #ff6600);
            color: #fff;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 2em;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        .botao-qr-fixo:hover {
            background: linear-gradient(135deg, #ff6600, #ff8c00);
            transform: scale(1.15);
            box-shadow: 0 12px 30px rgba(255, 102, 0, 0.8);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ===== MODAL QR CODE ===== */
        .modal-qr {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-qr.ativo {
            display: flex;
        }

        .modal-conteudo {
            background: linear-gradient(135deg, rgba(255, 69, 0, 0.95), rgba(255, 140, 0, 0.95));
            border: 3px solid #fff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 1001;
            animation: slideInUp 0.3s ease;
        }

        .modal-titulo {
            font-family: 'Pirata One', cursive;
            font-size: 2.5em;
            color: #fff;
            text-shadow: 3px 3px #000;
            margin-bottom: 20px;
        }

        .modal-descricao {
            color: #f0f0f0;
            font-size: 1.1em;
            margin-bottom: 30px;
            font-weight: bold;
        }

        #qrcode {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        #qrcode canvas, #qrcode img {
            width: 100% !important;
            height: auto !important;
            max-width: 280px;
        }

        .modal-instrucao {
            color: #fff;
            font-size: 0.95em;
            margin-top: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .fechar-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #fff;
            color: #fff;
            font-size: 2em;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .fechar-modal:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: rotate(90deg);
        }

        @media (max-width: 768px) {
            .botao-qr-fixo {
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }

            .modal-conteudo {
                margin: 20px;
                padding: 30px;
            }

            .modal-titulo {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="capa-container">
        <h1 class="capa-titulo">ONE PIECE</h1>
        <p class="capa-subtitulo">⚓ Bem-vindo ao Universo ⚓</p>

        <div class="botoes-container">
            <a href="personagens.html" class="botao-principal">
                <span class="botao-icone">👥</span>
                <span class="botao-label">Personagens</span>
            </a>

            <a href="anime.html" class="botao-principal">
                <span class="botao-icone">📺</span>
                <span class="botao-label">Anime</span>
            </a>

            <a href="curiosidades.html" class="botao-principal">
                <span class="botao-icone">🔍</span>
                <span class="botao-label">Curiosidades</span>
            </a>

            <a href="teorias.html" class="botao-principal">
                <span class="botao-icone">💭</span>
                <span class="botao-label">Teorias</span>
            </a>

            <a href="manga.html" class="botao-principal">
                <span class="botao-icone">📖</span>
                <span class="botao-label">Manga</span>
            </a>
        </div>
    </div>
</body>
</html>
