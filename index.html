<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="One Piece Brasil - Guia completo sobre anime One Piece. Personagens, mangá, curiosidades, teorias, episódios e leitor de mangá. A melhor comunidade One Piece do Brasil.">
    <meta name="keywords" content="One Piece, One Piece Brasil, anime brasileiro, manga, personagens, Luffy, Zoro, Sanji, Nami, Chopper, Usopp, Robin, Franky, Brook, Jimbei">
    <meta name="author" content="One Piece Brasil">
    <meta name="robots" content="index, follow">
    <meta name="language" content="Portuguese-BR">
    <meta name="theme-color" content="#ff6600">
    <meta property="og:type" content="website">
    <meta property="og:title" content="One Piece Brasil - Tudo Sobre o Anime e Mangá">
    <meta property="og:description" content="Descubra tudo sobre One Piece: personagens, arcos, teorias, curiosidades. Acesse o leitor de mangá e compartilhe com amigos.">
    <meta property="og:image" content="imagens/capa/capa.png.png">
    <meta property="og:url" content="https://onepiecebrasil.com.br">
    <meta property="og:site_name" content="One Piece Brasil">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="One Piece Brasil - Guia Completo">
    <meta name="twitter:description" content="Tudo sobre One Piece: personagens, mangá, anime e comunidade brasileira!">
    <meta name="twitter:image" content="imagens/capa/capa.png.png">
    <title>One Piece Brasil - Guia Completo do Anime e Mangá | Site Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background-image: url('imagens/capa/capa.png.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Pirata One', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .capa-container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            width: 100%;
            max-width: 1000px;
        }

        .capa-titulo {
            font-size: clamp(2rem, 8vw, 6em);
            color: #fff;
            text-shadow: 6px 6px 0 #000, -3px -3px 5px rgba(0,0,0,0.9);
            letter-spacing: clamp(2px, 1vw, 4px);
            animation: slideInDown 0.8s ease-out;
            font-weight: 900;
            margin-bottom: clamp(15px, 3vw, 20px);
        }

        .capa-subtitulo {
            font-size: clamp(1rem, 4vw, 2.5em);
            color: #ffdd00;
            text-shadow: 3px 3px 0 #000;
            animation: slideInUp 0.8s ease-out 0.3s backwards;
            letter-spacing: clamp(1px, 0.5vw, 2px);
            font-weight: bold;
            margin-bottom: clamp(30px, 5vw, 60px);
        }

        .botoes-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: clamp(10px, 2vw, 20px);
            margin-top: clamp(30px, 5vw, 50px);
            width: 100%;
            animation: fadeIn 1s ease-out 0.6s backwards;
        }

        .botao-principal {
            background: linear-gradient(135deg, rgba(255, 69, 0, 0.95), rgba(255, 140, 0, 0.95));
            border: 3px solid #fff;
            color: #fff;
            padding: clamp(15px, 3vw, 25px);
            font-size: clamp(0.8em, 1.2vw, 1.3em);
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: clamp(100px, 15vw, 140px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            animation: slideInUp 0.6s ease-out backwards;
        }

        .botao-principal:nth-child(1) { animation-delay: 0.7s; }
        .botao-principal:nth-child(2) { animation-delay: 0.8s; }
        .botao-principal:nth-child(3) { animation-delay: 0.9s; }
        .botao-principal:nth-child(4) { animation-delay: 1s; }
        .botao-principal:nth-child(5) { animation-delay: 1.1s; }

        .botao-principal::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .botao-principal:hover::before {
            left: 100%;
        }

        .botao-principal:hover {
            background: linear-gradient(135deg, rgba(255, 140, 0, 1), rgba(255, 200, 0, 1));
            transform: translateY(-10px) scale(1.08);
            box-shadow: 0 12px 30px rgba(255, 140, 0, 0.8);
        }

        .botao-principal:active {
            transform: scale(0.95);
        }

        .botao-icone {
            font-size: clamp(1.5em, 3vw, 2.5em);
            margin-bottom: clamp(5px, 1vw, 8px);
            display: block;
        }

        .botao-label {
            display: block;
            font-size: clamp(0.8em, 1vw, 1.1em);
        }

        /* ===== BOTÃO COMPARTILHAR FIXO ===== */
        .botao-compartilhar {
            position: fixed;
            bottom: clamp(15px, 3vw, 30px);
            right: clamp(15px, 3vw, 30px);
            background: linear-gradient(135deg, #ff4500, #ff6600);
            color: #fff;
            border: none;
            width: clamp(50px, 10vw, 70px);
            height: clamp(50px, 10vw, 70px);
            border-radius: 50%;
            cursor: pointer;
            font-size: clamp(1.2em, 2.5vw, 2em);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        .botao-compartilhar:hover {
            background: linear-gradient(135deg, #ff6600, #ff8c00);
            transform: scale(1.15);
            box-shadow: 0 12px 30px rgba(255, 102, 0, 0.8);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ===== MODAL COMPARTILHAR ===== */
        .modal-compartilhar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            padding: 20px;
        }

        .modal-compartilhar.ativo {
            display: flex;
        }

        .modal-conteudo-compartilhar {
            background: linear-gradient(135deg, rgba(255, 69, 0, 0.95), rgba(255, 140, 0, 0.95));
            border: 3px solid #fff;
            border-radius: 20px;
            padding: clamp(20px, 4vw, 40px);
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 1001;
            animation: slideInUp 0.3s ease;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-titulo-compartilhar {
            font-family: 'Pirata One', cursive;
            font-size: clamp(1.5em, 4vw, 2.5em);
            color: #fff;
            text-shadow: 3px 3px #000;
            margin-bottom: clamp(10px, 2vw, 20px);
        }

        .modal-descricao-compartilhar {
            color: #f0f0f0;
            font-size: clamp(0.9em, 1.5vw, 1.1em);
            margin-bottom: clamp(15px, 2vw, 25px);
            font-weight: bold;
        }

        .botoes-redes-sociais {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: clamp(8px, 1.5vw, 12px);
            margin: clamp(15px, 2vw, 25px) 0;
        }

        .botao-rede-social {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #fff;
            color: #fff;
            padding: clamp(10px, 2vw, 15px);
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: clamp(0.8em, 1vw, 0.95em);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(5px, 1vw, 8px);
        }

        .botao-rede-social:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .botao-rede-social-icon {
            font-size: clamp(1.5em, 2.5vw, 2em);
        }

        .campo-link {
            width: 100%;
            padding: clamp(8px, 1.5vw, 12px);
            border: 2px solid #fff;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            margin: clamp(10px, 2vw, 15px) 0;
            font-size: clamp(0.75em, 1vw, 0.9em);
        }

        #qrcode {
            background: #fff;
            padding: clamp(10px, 1.5vw, 15px);
            border-radius: 12px;
            display: inline-block;
            margin: clamp(10px, 2vw, 15px) 0;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        #qrcode canvas, #qrcode img {
            width: 100% !important;
            height: auto !important;
            max-width: clamp(180px, 40vw, 220px);
        }

        .modal-abas {
            display: flex;
            gap: clamp(5px, 1vw, 10px);
            margin-bottom: clamp(15px, 2vw, 20px);
            justify-content: center;
            flex-wrap: wrap;
        }

        .aba-botao {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #fff;
            color: #fff;
            padding: clamp(8px, 1vw, 10px) clamp(10px, 1.5vw, 15px);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: clamp(0.75em, 1vw, 0.9em);
        }

        .aba-botao.ativo {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffdd00;
        }

        .aba-conteudo {
            display: none;
        }

        .aba-conteudo.ativo {
            display: block;
        }

        .fechar-modal-compartilhar {
            position: absolute;
            top: clamp(10px, 2vw, 15px);
            right: clamp(10px, 2vw, 15px);
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #fff;
            color: #fff;
            font-size: clamp(1.5em, 2.5vw, 2em);
            width: clamp(40px, 8vw, 50px);
            height: clamp(40px, 8vw, 50px);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .fechar-modal-compartilhar:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: rotate(90deg);
        }

        .contador-visitas {
            position: fixed;
            top: clamp(10px, 2vw, 20px);
            left: clamp(10px, 2vw, 20px);
            background: rgba(255, 69, 0, 0.9);
            color: #fff;
            padding: clamp(8px, 1.5vw, 10px) clamp(12px, 2vw, 20px);
            border-radius: 12px;
            font-weight: bold;
            font-size: clamp(0.7em, 1vw, 0.9em);
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            z-index: 50;
        }

        /* ===== ANIMAÇÕES ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- CONTADOR DE VISITAS -->
    <div class="contador-visitas">
        👥 Visitas: <span id="contador">0</span>
    </div>

    <div class="capa-container">
        <h1 class="capa-titulo">ONE PIECE</h1>
        <p class="capa-subtitulo">⚓ Bem-vindo ao Universo ⚓</p>

        <div class="botoes-container">
            <a href="personagens.html" class="botao-principal">
                <span class="botao-icone">👥</span>
                <span class="botao-label">Personagens</span>
            </a>

            <a href="anime.html" class="botao-principal">
                <span class="botao-icone">📺</span>
                <span class="botao-label">Anime</span>
            </a>

            <a href="curiosidades.html" class="botao-principal">
                <span class="botao-icone">🔍</span>
                <span class="botao-label">Curiosidades</span>
            </a>

            <a href="teorias.html" class="botao-principal">
                <span class="botao-icone">💭</span>
                <span class="botao-label">Teorias</span>
            </a>

            <a href="manga.html" class="botao-principal">
                <span class="botao-icone">📖</span>
                <span class="botao-label">Manga</span>
            </a>
        </div>
    </div>

    <!-- BOTÃO COMPARTILHAR FIXO -->
    <button class="botao-compartilhar" onclick="abrirModalCompartilhar()" title="Compartilhar no Instagram">
        📱
    </button>

    <!-- MODAL COMPARTILHAR -->
    <div class="modal-compartilhar" id="modalCompartilhar">
        <div class="modal-conteudo-compartilhar">
            <button class="fechar-modal-compartilhar" onclick="fecharModalCompartilhar()">✕</button>
            
            <h2 class="modal-titulo-compartilhar">🚀 Compartilhe!</h2>
            <p class="modal-descricao-compartilhar">Divulgue One Piece para seus amigos!</p>

            <!-- ABAS -->
            <div class="modal-abas">
                <button class="aba-botao ativo" onclick="mudarAba('social')">Redes</button>
                <button class="aba-botao" onclick="mudarAba('qrcode')">QR</button>
                <button class="aba-botao" onclick="mudarAba('link')">Link</button>
            </div>

            <!-- ABA REDES SOCIAIS -->
            <div class="aba-conteudo ativo" id="aba-social">
                <div class="botoes-redes-sociais">
                    <button class="botao-rede-social" onclick="compartilharInstagram()">
                        <span class="botao-rede-social-icon">📷</span>
                        Instagram
                    </button>
                    <button class="botao-rede-social" onclick="compartilharWhatsapp()">
                        <span class="botao-rede-social-icon">💬</span>
                        WhatsApp
                    </button>
                    <button class="botao-rede-social" onclick="compartilharFacebook()">
                        <span class="botao-rede-social-icon">👍</span>
                        Facebook
                    </button>
                    <button class="botao-rede-social" onclick="compartilharTwitter()">
                        <span class="botao-rede-social-icon">𝕏</span>
                        Twitter
                    </button>
                </div>
            </div>

            <!-- ABA QR CODE -->
            <div class="aba-conteudo" id="aba-qrcode">
                <p style="color: #f0f0f0; margin-bottom: 15px; font-weight: bold;">Escaneie com a câmera do celular:</p>
                <div id="qrcode"></div>
                <p style="color: #f0f0f0; font-size: 0.9em; margin-top: 10px;">Escaneie este QR Code para acessar o site!</p>
            </div>

            <!-- ABA LINK -->
            <div class="aba-conteudo" id="aba-link">
                <p style="color: #f0f0f0; margin-bottom: 15px; font-weight: bold;">Copie e compartilhe o link:</p>
                <input type="text" id="urlSite" class="campo-link" readonly onclick="adicionarTexto()">
                <button onclick="copiarLink()" style="
                    background: rgba(0,0,0,0.3);
                    color: #fff;
                    border: 2px solid #fff;
                    padding: 10px 20px;
                    border-radius: 10px;
                    cursor: pointer;
                    margin-top: 10px;
                    font-weight: bold;
                    transition: all 0.3s;
                    width: 100%;
                    font-size: 0.95em;
                " onmouseover="this.style.background='rgba(0,0,0,0.6)'" onmouseout="this.style.background='rgba(0,0,0,0.3)'">
                    📋 Copiar Link
                </button>
            </div>
        </div>
    </div>

    <script>
        // Inicializar contador de visitas
        function inicializarContador() {
            let visitas = localStorage.getItem('onePieceVisitas') || 0;
            visitas = parseInt(visitas) + 1;
            localStorage.setItem('onePieceVisitas', visitas);
            document.getElementById('contador').textContent = visitas;

            // Analytics
            registrarAnalytics('visita', 'homepage');
        }

        // ===== FUNÇÕES DO MODAL =====
        function abrirModalCompartilhar() {
            document.getElementById('modalCompartilhar').classList.add('ativo');
            const urlSite = window.location.href;
            document.getElementById('urlSite').value = urlSite;
            
            // Limpar QR anterior
            document.getElementById('qrcode').innerHTML = '';
            
            // Gerar QR Code
            new QRCode(document.getElementById('qrcode'), {
                text: urlSite,
                width: 220,
                height: 220,
                colorDark: '#ff6600',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            registrarAnalytics('modal_aberto', 'compartilhar');
        }

        function fecharModalCompartilhar() {
            document.getElementById('modalCompartilhar').classList.remove('ativo');
        }

        // Mudar abas
        function mudarAba(aba) {
            document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.remove('ativo'));
            document.querySelectorAll('.aba-botao').forEach(el => el.classList.remove('ativo'));
            document.getElementById('aba-' + aba).classList.add('ativo');
            event.target.classList.add('ativo');
            
            registrarAnalytics('aba_social', aba);
        }

        // Adicionar texto para auxiliar
        function adicionarTexto() {
            document.getElementById('urlSite').select();
        }

        // Copiar link
        function copiarLink() {
            const urlInput = document.getElementById('urlSite');
            urlInput.select();
            document.execCommand('copy');
            
            const botao = event.target;
            const textoOriginal = botao.textContent;
            botao.textContent = '✅ Copiado!';
            setTimeout(() => {
                botao.textContent = textoOriginal;
            }, 2000);

            registrarAnalytics('link_copiado', 'compartilhar');
        }

        // ===== COMPARTILHAMENTOS SOCIAIS =====
        function compartilharInstagram() {
            const url = window.location.href;
            const texto = "Confira este incrível site sobre ONE PIECE! 🏴‍☠️📖\n" + url;
            
            // Copiar para clipboard
            const temp = document.createElement('textarea');
            temp.value = texto;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            
            // Abrir Instagram
            window.open("https://www.instagram.com/", '_blank');
            alert('✅ Link copiado!\n\nCole na sua bio do Instagram:\n' + url);
            
            registrarAnalytics('compartilhado', 'instagram');
        }

        function compartilharWhatsapp() {
            const url = window.location.href;
            const texto = "Oi! Confira este incrível site sobre ONE PIECE! 🏴‍☠️📖";
            const urlWhatsapp = "https://wa.me/?text=" + encodeURIComponent(texto + "\n" + url);
            window.open(urlWhatsapp, '_blank');
            
            registrarAnalytics('compartilhado', 'whatsapp');
        }

        function compartilharFacebook() {
            const url = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(window.location.href);
            window.open(url, '_blank', 'width=600,height=400');
            
            registrarAnalytics('compartilhado', 'facebook');
        }

        function compartilharTwitter() {
            const texto = "Confira este incrível site sobre ONE PIECE! 🏴‍☠️📖 #OnePiece";
            const url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(texto) + "&url=" + encodeURIComponent(window.location.href);
            window.open(url, '_blank');
            
            registrarAnalytics('compartilhado', 'twitter');
        }

        // ===== ANALYTICS =====
        function registrarAnalytics(acao, dados) {
            const analytics = {
                timestamp: new Date().toISOString(),
                acao: acao,
                dados: dados,
                pagina: window.location.href,
                userAgent: navigator.userAgent.substring(0, 50)
            };
            
            // Armazenar localmente
            let historico = JSON.parse(localStorage.getItem('onepcAnalytics') || '[]');
            historico.push(analytics);
            
            // Manter só últimas 100 ações
            if (historico.length > 100) {
                historico = historico.slice(-100);
            }
            
            localStorage.setItem('onepcAnalytics', JSON.stringify(historico));
        }

        // ===== EVENT LISTENERS =====
        
        // Fechar ao clicar fora
        document.getElementById('modalCompartilhar').addEventListener('click', function(e) {
            if (e.target === this) {
                fecharModalCompartilhar();
            }
        });

        // Fechar com ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                fecharModalCompartilhar();
            }
        });

        // Inicializar ao carregar
        window.addEventListener('load', inicializarContador);
    </script>
</body>
</html>
